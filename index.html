<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #e9e9e9, #cfcfcf);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      width: 420px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .profile-image {
      width: 100%;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 24px;
      font-size: 32px;
      letter-spacing: -1px;
      color: #111;
    }

    p {
      margin-top: 10px;
      color: #666;
      line-height: 1.7;
      font-size: 15px;
    }

    .tag {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: #111;
      color: white;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .footer {
      position: fixed;
      bottom: 20px;
      right: 25px;
      color: #666;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="index.png" alt="프로필 사진" class="profile-image" />

    <h1>KIM MINSEOK</h1>

    <p>
      GitHub Pages 기반 개인 프로필 페이지입니다.<br/>
      업로드한 이미지를 중심으로 미니멀 스타일로 구성했습니다.
    </p>

    <div class="tag">
      PROFILE PAGE
    </div>
  </div>

  <div class="footer">
    Designed for GitHub Pages
  </div>

</body>
</html>
